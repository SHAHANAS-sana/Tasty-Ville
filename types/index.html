<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TastyVille</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>
<body>
    <nav class="navbar">
        <div class="logo">TastyVille</div>
        <ul class="nav-links">
            <li><a href="#menu">Menu</a></li>
            <li><a href="#about">About</a></li>
            <li><a href="#contact">Contact</a></li>
        </ul>
        <div class="hamburger">
            <div class="line"></div>
            <div class="line"></div>
            <div class="line"></div>
        </div>
    </nav>

    <header class="hero">
        <h1>Fire Flavour & Family in Every Bite</h1>
        <div class="business-info">
            <p>4.1 Stars</p>
            <p>1,154 Reviews</p>
            <p>Open Daily 5 AM - 3 AM</p>
            <p>Family & Private Dining</p>
        </div>
        <button class="explore-menu">Explore Menu</button>
        <button class="call-to-order">Call to Order</button>
    </header>

    <section class="rating-card">
        <h2>Our Rating</h2>
        <p>4.1</p>
    </section>

    <div class="scroll-indicator">
        <p>Scroll Down</p>
    </div>

    <footer>
        <p>&copy; 2026 TastyVille</p>
    </footer>
</body>
</html>
